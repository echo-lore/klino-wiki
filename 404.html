<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Страница не найдена | Эхо Безликих</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cinzel+Decorative:wght@400&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23080610'/%3E%3Cpolygon points='16,3 29,10 29,22 16,29 3,22 3,10' fill='none' stroke='%238c1e1e' stroke-width='1.5'/%3E%3Cpolygon points='16,8 24,12.5 24,19.5 16,24 8,19.5 8,12.5' fill='%238c1e1e' opacity='0.35'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23c8a84e' opacity='0.9'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#040308;
  --bg2:#0a0810;
  --text:#ede8d8;
  --text-dim:rgba(237,232,216,0.70);
  --text-faint:rgba(237,232,216,0.35);
  --gold:#d4a93e;
  --gold-dim:rgba(212,169,62,0.22);
  --gold-line:rgba(212,169,62,0.38);
  --red:#8c1c1c;
  --red-dim:rgba(140,28,28,0.28);
  --border:rgba(255,255,255,0.048);
  --glass:rgba(12,9,20,0.82);
  --shadow:0 12px 48px rgba(0,0,0,0.72);
  --font-body:'Cormorant Garamond','IM Fell English',Georgia,serif;
  --font-serif:'IM Fell English','Palatino Linotype',Georgia,serif;
  --font-display:'Cinzel','Palatino Linotype',Georgia,serif;
  --font-deco:'Cinzel Decorative','Cinzel',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  overflow:hidden;
  position:relative;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
}
#bg-overlay{
  position:fixed; inset:0; z-index:-3; pointer-events:none;
  background:
    radial-gradient(ellipse 72% 48% at 12% 6%, rgba(92,56,160,0.14) 0%, transparent 56%),
    radial-gradient(ellipse 58% 40% at 88% 88%, rgba(128,18,18,0.16) 0%, transparent 52%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #0a0810 0%, #040308 100%);
}
#bg-anim{
  position:fixed; inset:0; z-index:-2; pointer-events:none; overflow:hidden;
}
#bg-anim::before{
  content:''; position:absolute; inset:-30%;
  background:radial-gradient(ellipse 60% 52% at 20% 14%, rgba(92,56,160,0.11) 0%, transparent 60%);
  animation:bgFloat1 36s ease-in-out infinite;
}
#bg-anim::after{
  content:''; position:absolute; inset:-30%;
  background:radial-gradient(ellipse 52% 40% at 80% 80%, rgba(128,18,18,0.12) 0%, transparent 58%);
  animation:bgFloat2 44s ease-in-out infinite;
}
#grain-overlay{
  position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:0.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px; mix-blend-mode:overlay;
}
canvas#stars{position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.42}
@keyframes bgFloat1{
  0%,100%{transform:translate(0,0) scale(1)}
  35%{transform:translate(2.2%,1.6%) scale(1.05)}
  70%{transform:translate(-1.6%,2.2%) scale(0.96)}
}
@keyframes bgFloat2{
  0%,100%{transform:translate(0,0) scale(1)}
  42%{transform:translate(-2%,-1.4%) scale(1.04)}
  75%{transform:translate(1.4%,-2%) scale(0.97)}
}
.container{
  width:min(100%, 700px);
  text-align:center;
  position:relative;
  z-index:2;
  background:var(--glass);
  border:1px solid var(--border);
  border-top:2px solid var(--red);
  box-shadow:var(--shadow);
  padding:42px 28px 36px;
}
.container::before{
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(to right, transparent, var(--gold-line), transparent);
}
.eyebrow{
  font-family:var(--font-display);
  font-size:.58rem;
  letter-spacing:.42em;
  text-transform:uppercase;
  color:var(--gold);
  opacity:.66;
  margin-bottom:18px;
}
.sigil{
  display:block;
  margin:0 auto 18px;
  width:64px; height:64px;
  opacity:.58;
}
.code{
  font-family:var(--font-deco);
  font-size:clamp(4.8rem, 16vw, 8.8rem);
  line-height:1;
  letter-spacing:.08em;
  color:transparent;
  -webkit-text-stroke:1px rgba(190,42,42,0.85);
  background:linear-gradient(145deg, #c43838 15%, #7a1414 100%);
  -webkit-background-clip:text;
  background-clip:text;
  text-shadow:0 0 70px rgba(140,28,28,.28);
  margin-bottom:6px;
}
.title{
  font-family:var(--font-deco);
  font-size:clamp(1.2rem, 3vw, 1.9rem);
  font-weight:400;
  letter-spacing:.04em;
  margin-bottom:14px;
}
.desc{
  max-width:460px;
  margin:0 auto 28px;
  font-family:var(--font-serif);
  font-style:italic;
  font-size:1rem;
  line-height:1.85;
  color:var(--text-dim);
}
.divider{
  width:96px; height:1px;
  background:linear-gradient(to right, transparent, var(--gold-line), transparent);
  margin:0 auto 26px;
}
.back-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:12px 24px;
  background:rgba(140,28,28,0.14);
  border:1px solid rgba(140,28,28,0.45);
  color:var(--text);
  font-family:var(--font-display);
  font-size:.7rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  text-decoration:none;
  transition:background .2s, border-color .2s, box-shadow .2s, color .2s;
}
.back-btn:hover{
  background:rgba(140,28,28,0.24);
  border-color:rgba(212,169,62,0.35);
  box-shadow:0 0 24px rgba(140,28,28,.18);
  color:var(--gold);
}
.footer-note{
  margin-top:28px;
  font-family:var(--font-display);
  font-size:.58rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--text-faint);
}
.bottom-rule{
  width:1px; height:58px;
  background:linear-gradient(to bottom, var(--red), transparent);
  margin:26px auto 0;
  opacity:.45;
}
@media (max-width:640px){
  .container{padding:34px 18px 30px}
  .eyebrow{letter-spacing:.28em}
  .desc{font-size:.94rem}
}
@media (prefers-reduced-motion:reduce){
  #bg-anim::before,#bg-anim::after{animation:none}
}
</style>
</head>
<body>
<div id="bg-overlay" aria-hidden="true"></div>
<div id="bg-anim" aria-hidden="true"></div>
<div id="grain-overlay" aria-hidden="true"></div>
<canvas id="stars" aria-hidden="true"></canvas>

<div class="container">
  <div class="eyebrow">Эхо Безликих · Лоркомпендиум</div>

  <svg class="sigil" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <polygon points="36,3 69,21 69,51 36,69 3,51 3,21" stroke="#d4a93e" stroke-width="0.9" fill="none" opacity="0.78"/>
    <polygon points="36,13 59,26 59,46 36,59 13,46 13,26" stroke="#8c1c1c" stroke-width="0.9" fill="none" opacity="0.58"/>
    <circle cx="36" cy="36" r="11" stroke="#d4a93e" stroke-width="0.8" fill="none" opacity="0.62"/>
    <circle cx="36" cy="36" r="3.5" fill="#d4a93e" opacity="0.88"/>
  </svg>

  <div class="code">404</div>

  <h1 class="title">Страница потеряна в Таире</h1>

  <p class="desc">
    Этого места не существует — или оно было поглощено тьмой.
    Возможно, вы попали в разлом, ведущий за пределы вселенной.
  </p>

  <div class="divider"></div>

  <a class="back-btn" href="index.html">← Вернуться в Компендиум</a>

  <div class="footer-note">KlinoArt · Эхо Безликих</div>
  <div class="bottom-rule"></div>
</div>

<script>
(function() {
  const canvas = document.getElementById('stars');
  if (!canvas) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function init() {
    stars = [];
    const n = Math.floor((W * H) / 4200);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.1 + 0.2,
        a: Math.random() * 0.6 + 0.15,
        sp: Math.random() * 0.003 + 0.001,
        ph: Math.random() * Math.PI * 2,
        hue: Math.random() < 0.12
          ? (Math.random() < 0.5 ? 'rgba(212,169,62,' : 'rgba(180,80,80,')
          : 'rgba(237,232,216,'
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    const time = t * 0.001;
    for (const s of stars) {
      const a = s.a * (0.5 + 0.5 * Math.sin(time * s.sp * 60 + s.ph));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.hue + a.toFixed(3) + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); init(); }, { passive: true });
  resize();
  init();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
