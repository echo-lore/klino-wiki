<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Страница не найдена | Эхо Безликих</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23080610'/%3E%3Cpolygon points='16,3 29,10 29,22 16,29 3,22 3,10' fill='none' stroke='%238c1e1e' stroke-width='1.5'/%3E%3Cpolygon points='16,8 24,12.5 24,19.5 16,24 8,19.5 8,12.5' fill='%238c1e1e' opacity='0.35'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23c8a84e' opacity='0.9'/%3E%3C/svg%3E">
<style>
:root {
  --bg:         #080610;
  --bg2:        #0d0b18;
  --text:       #e4ddd0;
  --text-dim:   rgba(228,221,208,0.60);
  --text-faint: rgba(228,221,208,0.32);
  --gold:       #c8a84e;
  --gold-glow:  rgba(200,168,78,0.18);
  --gold-dim:   rgba(200,168,78,0.22);
  --red:        #8c1e1e;
  --border:     rgba(255,255,255,0.065);
  --font-serif: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
  --font-ui:    'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
a { color: var(--gold); text-decoration: none; }
a:hover { text-decoration: underline; }

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--font-serif);
  font-size: 15px;
  line-height: 1.78;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  overflow: hidden;
  position: relative;
}

/* Ambient glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 30% 20%, rgba(80,30,100,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 70% 80%, rgba(100,20,20,0.16) 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #0d0b18 0%, #080610 100%);
  z-index: -2;
  pointer-events: none;
}

canvas#stars { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.5; }

.container {
  text-align: center;
  max-width: 560px;
  position: relative;
  z-index: 1;
}

/* Top accent line */
.container::before {
  content: '';
  display: block;
  width: 1px;
  height: 80px;
  background: linear-gradient(to bottom, transparent, var(--red));
  margin: 0 auto 32px;
  opacity: 0.6;
}

.eyebrow {
  font-family: var(--font-ui);
  font-size: 0.6rem;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.65;
  margin-bottom: 18px;
}

.code {
  font-family: var(--font-serif);
  font-size: clamp(5rem, 18vw, 9rem);
  font-weight: normal;
  line-height: 1;
  letter-spacing: 0.04em;
  color: transparent;
  -webkit-text-stroke: 1px rgba(140, 30, 30, 0.6);
  background: linear-gradient(135deg, #8c1e1e 0%, #3a0a0a 60%);
  -webkit-background-clip: text;
  background-clip: text;
  text-shadow: none;
  margin-bottom: 6px;
  position: relative;
}

/* Subtle glow behind the 404 */
.code::after {
  content: attr(data-text);
  position: absolute;
  inset: 0;
  color: transparent;
  -webkit-text-stroke: 0px;
  text-shadow: 0 0 80px rgba(140,30,30,0.35);
  pointer-events: none;
  z-index: -1;
}

.title {
  font-family: var(--font-serif);
  font-size: clamp(1.1rem, 3vw, 1.6rem);
  font-weight: normal;
  color: var(--text);
  margin-bottom: 14px;
  letter-spacing: 0.04em;
}

.desc {
  font-style: italic;
  font-size: 0.92rem;
  color: var(--text-dim);
  line-height: 1.8;
  margin-bottom: 36px;
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
}

.divider {
  width: 80px;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(200,168,78,0.35), transparent);
  margin: 0 auto 32px;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 11px 30px;
  background: rgba(140,30,30,0.14);
  border: 1px solid rgba(140,30,30,0.45);
  border-radius: 3px;
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
  text-decoration: none;
}
.back-btn:hover {
  background: rgba(140,30,30,0.28);
  border-color: rgba(140,30,30,0.65);
  box-shadow: 0 0 22px rgba(140,30,30,0.22);
  text-decoration: none;
}

.footer-note {
  margin-top: 48px;
  font-family: var(--font-ui);
  font-size: 0.62rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.footer-note a { color: var(--gold); opacity: 0.6; }
.footer-note a:hover { opacity: 1; }

/* Bottom accent line */
.bottom-rule {
  width: 1px;
  height: 60px;
  background: linear-gradient(to bottom, var(--red), transparent);
  margin: 32px auto 0;
  opacity: 0.5;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">
  <div class="eyebrow">Эхо Безликих · Лоркомпендиум</div>

  <div class="code" data-text="404">404</div>

  <h1 class="title">Страница потеряна в Таире</h1>

  <p class="desc">
    Этого места не существует — или оно было поглощено тьмой.
    Возможно, вы попали в разлом, ведущий за пределы вселенной.
  </p>

  <div class="divider"></div>

  <a class="back-btn" href="index.html">
    ← Вернуться в Компендиум
  </a>

  <div class="bottom-rule"></div>

  <div class="footer-note">
    KlinoArt · <a href="index.html">echo-kompendium</a>
  </div>
</div>

<script>
/* Stars canvas — same logic as main page */
(function() {
  const canvas = document.getElementById('stars');
  if (!canvas) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  function init() {
    stars = [];
    const n = Math.floor((W * H) / 4200);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.1 + 0.2,
        a: Math.random() * 0.6 + 0.15,
        sp: Math.random() * 0.003 + 0.001,
        ph: Math.random() * Math.PI * 2,
        hue: Math.random() < 0.12
          ? (Math.random() < 0.5 ? 'rgba(200,168,78,' : 'rgba(180,80,80,')
          : 'rgba(228,221,208,'
      });
    }
  }
  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    const time = t * 0.001;
    for (const s of stars) {
      const a = s.a * (0.5 + 0.5 * Math.sin(time * s.sp * 60 + s.ph));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.hue + a.toFixed(3) + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', () => { resize(); init(); }, { passive: true });
  resize(); init();
  requestAnimationFrame(draw);
})();
</script>

</body>
</html>
